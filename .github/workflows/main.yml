name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Pages content
        run: |
          mkdir -p public
          # Copy aiapp.html to index.html so the site is served at the repository root
          if [ -f aiapp.html ]; then cp aiapp.html public/index.html; else echo "aiapp.html not found"; fi
          # Copy other site assets if present
          if [ -d static ]; then cp -r static public/ || true; fi

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
